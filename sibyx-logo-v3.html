<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIBYX Logo V3 — 盾牌+解码故障</title>
<style>
  :root{ --navy:#0B1437; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Inter','Segoe UI',system-ui,sans-serif; color:#1B2440; }
  .wrap{ max-width:960px; margin:0 auto; padding:32px 24px 64px; }
  h1{ font-size:22px; margin:0 0 4px; }
  p.sub{ color:#5B6B8C; margin:0 0 26px; font-size:14px; line-height:1.6; }
  .panel{ border-radius:16px; padding:40px; margin:16px 0; }
  .light{ background:#F4F7FB; border:1px solid #E3E9F2; }
  .dark{ background:var(--navy); }
  .row{ display:flex; align-items:center; gap:32px; flex-wrap:wrap; }
  .card{ background:#fff; border:1px solid #E3E9F2; border-radius:12px; padding:24px; display:flex; align-items:center; justify-content:center; }
  .card.dark{ background:#111C3D; border-color:#22305A; }
  img.lg{ width:460px; height:auto; max-width:100%; }
  .label{ font-size:12px; color:#8A97B0; margin-top:12px; text-align:center; }
  .decode{ font-family:'JetBrains Mono','Courier New',monospace; font-size:72px; font-weight:700; letter-spacing:6px; color:#0B1437; }
  .glitch{ animation:glitch 2.6s infinite; text-shadow:3px 0 #00D6C2,-3px 0 #FF3D7F; }
  @keyframes glitch{
    0%,92%,100%{ transform:translate(0,0); text-shadow:3px 0 #00D6C2,-3px 0 #FF3D7F; }
    93%{ transform:translate(-2px,1px); text-shadow:5px 0 #00D6C2,-5px 0 #FF3D7F; }
    96%{ transform:translate(2px,-1px); text-shadow:-4px 0 #00D6C2,4px 0 #FF3D7F; }
  }
  .dark .decode{ color:#EAF1FF; }
  .dl{ display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; }
  a.btn{ text-decoration:none; font-size:13px; padding:9px 16px; border-radius:9px; background:#3B6BFF; color:#fff; font-weight:600; }
  a.btn.ghost{ background:#fff; color:#3B6BFF; border:1px solid #C9D6F0; }
  .dark a.btn.ghost{ background:transparent; color:#7FE9DD; border-color:#2C5C66; }
  code{ background:#EEF2F8; padding:2px 6px; border-radius:5px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>SIBYX · Logo V3 — 盾牌图标 + 解码故障字标</h1>
  <p class="sub">
    融合 V1 与 V2：左侧 <b>盾牌 + 对话气泡 + 三点输入态</b>（安全·沟通·实时）；右侧 <b>SibyX</b> 保持解码故障风
    （RGB 错位 + 安全扫描线），且 <b>IBY 改小写</b>、末端 <b>X 变形为带钥匙孔的锁</b>。
  </p>

  <div class="panel light">
    <div class="row">
      <div>
        <div class="card"><img class="lg" src="sibyx-logo-v3.svg" alt="SibyX V3"></div>
        <div class="label">静态矢量稿（浅底）</div>
      </div>
      <div>
        <div class="decode glitch" id="dc">SibyX</div>
        <div class="label">动效演示：乱码 → 解码</div>
      </div>
    </div>
  </div>

  <div class="panel dark">
    <div class="row">
      <div>
        <div class="card dark"><img class="lg" src="sibyx-logo-v3.svg" alt="SibyX V3"></div>
        <div class="label" style="color:#7C8AA8">静态矢量稿（深底）</div>
      </div>
      <div>
        <div class="decode glitch" id="dc2">SibyX</div>
        <div class="label" style="color:#7C8AA8">动效演示：乱码 → 解码</div>
      </div>
    </div>
  </div>

  <div class="dl">
    <a class="btn" href="sibyx-logo-v3.svg" download>下载 V3 矢量稿</a>
    <a class="btn ghost" href="sibyx-logo-v2.svg" download>回看 V2</a>
    <a class="btn ghost" href="sibyx-logo.svg" download>回看 V1</a>
  </div>
</div>

<script>
  (function(){
    const TARGET = "SibyX";
    const POOL = "▓▒░#@%&*abcde0123456789<>/\\";
    const el = document.getElementById('dc');
    const el2 = document.getElementById('dc2');
    let frame = 0;
    function rnd(){ return POOL[(Math.random()*POOL.length)|0]; }
    function tick(){
      frame++;
      const settled = Math.min(TARGET.length, (frame/4)|0);
      let out = "";
      for(let i=0;i<TARGET.length;i++){ out += (i<settled)?TARGET[i]:rnd(); }
      el.textContent = out; if(el2) el2.textContent = out;
      requestAnimationFrame(()=>setTimeout(tick,70));
    }
    tick();
  })();
</script>
</body>
</html>
