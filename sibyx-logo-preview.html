<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIBYX Logo Preview</title>
<style>
  :root{ --navy:#0B1437; --ink:#1B2440; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif; color:var(--ink); }
  .wrap{ max-width:920px; margin:0 auto; padding:32px 24px 64px; }
  h1{ font-size:22px; margin:0 0 4px; }
  p.sub{ color:#5B6B8C; margin:0 0 28px; font-size:14px; }
  .panel{ border-radius:16px; padding:40px; margin:16px 0; display:flex; flex-direction:column; gap:28px; align-items:flex-start; }
  .light{ background:#F4F7FB; border:1px solid #E3E9F2; }
  .dark{ background:var(--navy); }
  .row{ display:flex; align-items:center; gap:32px; flex-wrap:wrap; }
  .card{ background:#fff; border:1px solid #E3E9F2; border-radius:12px; padding:20px; display:flex; align-items:center; justify-content:center; }
  .card.dark{ background:#111C3D; border-color:#22305A; }
  .logo-lg{ width:360px; height:auto; }
  .icon-lg{ width:120px; height:120px; }
  .icon-sm{ width:56px; height:56px; }
  .label{ font-size:12px; color:#8A97B0; margin-top:10px; text-align:center; }
  .dl{ display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
  a.btn{ text-decoration:none; font-size:13px; padding:9px 16px; border-radius:9px; background:#3B6BFF; color:#fff; font-weight:600; }
  a.btn.ghost{ background:#fff; color:#3B6BFF; border:1px solid #C9D6F0; }
  .dark a.btn.ghost{ background:transparent; color:#7FE9DD; border-color:#2C5C66; }
  code{ background:#EEF2F8; padding:2px 6px; border-radius:5px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>SIBYX · 品牌 Logo 预览</h1>
  <p class="sub">盾牌 = 安全 · 对话气泡 = 沟通 · 三点 = 实时加密通讯 · 蓝→青渐变 = 信任 + 加密</p>

  <!-- LIGHT -->
  <div class="panel light">
    <div class="row">
      <div>
        <div class="card"><img class="logo-lg" src="sibyx-logo.svg" alt="SIBYX logo"></div>
        <div class="label">横版组合（浅色背景）</div>
      </div>
      <div>
        <div class="card"><img class="icon-lg" src="sibyx-icon.svg" alt="SIBYX icon"></div>
        <div class="label">图标（透明底）</div>
      </div>
    </div>
  </div>

  <!-- DARK -->
  <div class="panel dark">
    <div class="row">
      <div>
        <div class="card dark"><img class="logo-lg" src="sibyx-logo.svg" alt="SIBYX logo"></div>
        <div class="label" style="color:#7C8AA8">横版组合（深色背景）</div>
      </div>
      <div>
        <div class="card dark"><img class="icon-lg" src="sibyx-icon.svg" alt="SIBYX icon"></div>
        <div class="label" style="color:#7C8AA8">图标（透明底）</div>
      </div>
      <div>
        <div class="card dark"><img class="icon-sm" src="sibyx-icon.svg" alt="SIBYX favicon"></div>
        <div class="label" style="color:#7C8AA8"> favicon 尺寸</div>
      </div>
    </div>
  </div>

  <div class="dl">
    <a class="btn" href="sibyx-logo.svg" download>下载 横版 SVG</a>
    <a class="btn ghost" href="sibyx-icon.svg" download>下载 图标 SVG</a>
  </div>
  <p class="sub" style="margin-top:24px">
    使用：把 <code>sibyx-icon.svg</code> 转成 <code>favicon.ico</code>/<code>192.png</code>/<code>512.png</code> 放入站点；
    <code>sibyx-logo.svg</code> 用于官网页眉与文档。颜色变量在文件顶部 <code>&lt;linearGradient id="g"&gt;</code> 处修改。
  </p>
</div>
</body>
</html>
