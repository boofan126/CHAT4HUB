# Render Blueprint：一次连接仓库即同时部署两层
#   1) chat4        —— 静态站（前端，免费、无需绑卡）
#   2) chat4hub-relay  —— GunDB 中继（Node Web 服务，免费、无需绑卡；
#                          空闲 15 分钟后会休眠，下次访问冷启动 30–60 秒）
# 用法：Render 控制台 → New + → Blueprint → 连接含本文件的仓库即可。

staticSites:
  - name: chat4
    rootDir: .
    buildCommand: echo "Static site: no build step"
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    # 告诉 Render 这是纯静态站，不要尝试检测框架或跑 npm
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600

services:
  - type: web
    name: chat4hub-relay
    plan: free
    rootDir: relay
    runtime: node
    # 明确锁定 Node 版本（Render 默认用 LTS，但显式指定更可靠）
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        sync: false
      - key: GUN_FILE
        value: ./data
    buildCommand: npm install --prefer-online
    startCommand: node relay.js
    healthCheckPath: /healthz
