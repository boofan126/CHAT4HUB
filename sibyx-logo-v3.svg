<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240" role="img" aria-label="SibyX">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B6BFF"/>
      <stop offset="1" stop-color="#00D6C2"/>
    </linearGradient>
  </defs>

  <!-- LEFT: shield + chat bubble + keyhole (safety), spaced ~1 char from S -->
  <g transform="translate(74,58) scale(0.23)">
    <path d="M256 36 L438 112 V252 C438 372 356 454 256 486 C156 454 74 372 74 252 V112 Z" fill="url(#g)"/>
    <path d="M170 166 H342 a28 28 0 0 1 28 28 V262 a28 28 0 0 1 -28 28 H210 L182 326 V290 H170 a28 28 0 0 1 -28 -28 V194 a28 28 0 0 1 28 -28 Z" fill="#FFFFFF"/>
    <!-- keyhole inside bubble (enlarged) -->
    <circle cx="256" cy="216" r="32" fill="#3B6BFF"/>
    <path d="M238 236 H274 L266 278 H246 Z" fill="#3B6BFF"/>
  </g>

  <!-- subtle chromatic ghosts of wordmark SibyX (S & X hero) -->
  <text x="200" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="110" font-weight="700" letter-spacing="6" fill="#00D6C2" opacity="0.18" transform="translate(-3,1)"><tspan font-size="140">S</tspan><tspan>i</tspan><tspan>b</tspan><tspan>y</tspan><tspan font-size="140">X</tspan></text>
  <text x="200" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="110" font-weight="700" letter-spacing="6" fill="#FF3D7F" opacity="0.14" transform="translate(3,-1)"><tspan font-size="140">S</tspan><tspan>i</tspan><tspan>b</tspan><tspan>y</tspan><tspan font-size="140">X</tspan></text>

  <!-- main wordmark: S & X hero (140), iby regular (110) -->
  <text x="200" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="110" font-weight="700" letter-spacing="6" fill="url(#g)"><tspan font-size="140">S</tspan><tspan>i</tspan><tspan>b</tspan><tspan>y</tspan><tspan font-size="140">X</tspan></text>

  <!-- hollow key (outline only) at center of X -->
  <g fill="none" stroke="#0B1437" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="549" cy="104" r="5.5"/>
    <line x1="549" y1="109" x2="549" y2="127"/>
    <line x1="549" y1="117" x2="554" y2="117"/>
    <line x1="549" y1="122" x2="553" y2="122"/>
  </g>

  <!-- secure scan line -->
  <rect x="190" y="120" width="620" height="2" fill="#7FE9DD" opacity="0.65"/>
</svg>
