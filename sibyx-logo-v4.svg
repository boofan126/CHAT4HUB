<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240" role="img" aria-label="SibyX">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B6BFF"/>
      <stop offset="1" stop-color="#00D6C2"/>
    </linearGradient>
    <!-- key gradient in user space so the two crossed keys share one continuous ramp -->
    <linearGradient id="gk" x1="505" y1="55" x2="600" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B6BFF"/>
      <stop offset="1" stop-color="#00D6C2"/>
    </linearGradient>
  </defs>

  <!-- LEFT: shield + chat bubble + keyhole (safety), spaced ~1 char from S -->
  <g transform="translate(74,58) scale(0.23)">
    <path d="M256 36 L438 112 V252 C438 372 356 454 256 486 C156 454 74 372 74 252 V112 Z" fill="url(#g)"/>
    <path d="M170 166 H342 a28 28 0 0 1 28 28 V262 a28 28 0 0 1 -28 28 H210 L182 326 V290 H170 a28 28 0 0 1 -28 -28 V194 a28 28 0 0 1 28 -28 Z" fill="#FFFFFF"/>
    <!-- keyhole inside bubble -->
    <circle cx="256" cy="216" r="32" fill="#3B6BFF"/>
    <path d="M238 236 H274 L266 278 H246 Z" fill="#3B6BFF"/>
  </g>

  <!-- subtle chromatic ghosts of wordmark Siby (S hero) -->
  <text x="200" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="110" font-weight="700" letter-spacing="6" fill="#00D6C2" opacity="0.18" transform="translate(-3,1)"><tspan font-size="140">S</tspan><tspan>i</tspan><tspan>b</tspan><tspan>y</tspan></text>
  <text x="200" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="110" font-weight="700" letter-spacing="6" fill="#FF3D7F" opacity="0.14" transform="translate(3,-1)"><tspan font-size="140">S</tspan><tspan>i</tspan><tspan>b</tspan><tspan>y</tspan></text>

  <!-- main wordmark: Siby (S hero 140, iby regular 110) — X replaced by crossed keys -->
  <text x="200" y="160" font-family="'JetBrains Mono','Courier New',monospace" font-size="110" font-weight="700" letter-spacing="6" fill="url(#g)"><tspan font-size="140">S</tspan><tspan>i</tspan><tspan>b</tspan><tspan>y</tspan></text>

  <!-- X built from two crossed keys (45°), same gradient color as wordmark -->
  <g fill="url(#gk)">
    <!-- key rotated +45° -->
    <g transform="translate(560,104) rotate(45)">
      <circle cx="0" cy="-40" r="13" fill="none" stroke="url(#gk)" stroke-width="8"/>
      <rect x="-4.5" y="-28" width="9" height="66" rx="3"/>
      <rect x="4.5" y="18" width="12" height="7" rx="1.5"/>
      <rect x="4.5" y="30" width="9" height="7" rx="1.5"/>
    </g>
    <!-- key rotated -45° -->
    <g transform="translate(560,104) rotate(-45)">
      <circle cx="0" cy="-40" r="13" fill="none" stroke="url(#gk)" stroke-width="8"/>
      <rect x="-4.5" y="-28" width="9" height="66" rx="3"/>
      <rect x="4.5" y="18" width="12" height="7" rx="1.5"/>
      <rect x="4.5" y="30" width="9" height="7" rx="1.5"/>
    </g>
  </g>

  <!-- secure scan line -->
  <rect x="190" y="120" width="620" height="2" fill="#7FE9DD" opacity="0.65"/>
</svg>
