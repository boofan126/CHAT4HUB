<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220" role="img" aria-label="SIBYX">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B6BFF"/>
      <stop offset="1" stop-color="#00D6C2"/>
    </linearGradient>
    <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B6BFF"/>
      <stop offset="1" stop-color="#00D6C2"/>
    </linearGradient>
  </defs>

  <!-- glitch ghosts (chromatic split) -->
  <text x="50" y="150" font-family="'JetBrains Mono','Courier New',monospace" font-size="100" font-weight="700" letter-spacing="6" fill="#00D6C2" opacity="0.35" transform="translate(-5,2)">SIBYX</text>
  <text x="50" y="150" font-family="'JetBrains Mono','Courier New',monospace" font-size="100" font-weight="700" letter-spacing="6" fill="#FF3D7F" opacity="0.30" transform="translate(5,-2)">SIBYX</text>

  <!-- main wordmark -->
  <text x="50" y="150" font-family="'JetBrains Mono','Courier New',monospace" font-size="100" font-weight="700" letter-spacing="6" fill="url(#g)">SIBYX</text>

  <!-- secure scan line -->
  <rect x="30" y="110" width="700" height="2" fill="#7FE9DD" opacity="0.65"/>

  <!-- deformed X -> keyhole lock -->
  <g stroke="url(#xg)" stroke-width="15" stroke-linecap="round" fill="none">
    <line x1="323" y1="82" x2="377" y2="144"/>
    <line x1="377" y1="82" x2="323" y2="144"/>
  </g>
  <circle cx="350" cy="113" r="10" fill="#0B1437"/>
  <rect x="345" y="113" width="10" height="15" rx="2" fill="#0B1437"/>
</svg>
