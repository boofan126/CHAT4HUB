<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SibyX — privacy-first local encrypted chat. No phone, no email, no password: your identity is a key." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title data-i18n="pageTitle">SibyX</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- GunDB：可选的去中心化 P2P 同步层（本地自托管，避免外部 CDN 不稳定）。无网络时自动回退纯本地。 -->
  <script src="gun.js"></script>
</head>
<body>
  <!-- 欢迎页（首屏，点击「开始使用」后隐藏） -->
  <div id="welcome" class="welcome-screen">
    <div class="welcome-bg" aria-hidden="true">
      <div class="wg-grid"></div>
      <div class="wg-glow wg-glow-1"></div>
      <div class="wg-glow wg-glow-2"></div>
      <svg class="wg-nodes" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <g class="wg-lines">
          <line x1="120" y1="140" x2="380" y2="240"/>
          <line x1="380" y1="240" x2="650" y2="130"/>
          <line x1="650" y1="130" x2="890" y2="270"/>
          <line x1="380" y1="240" x2="300" y2="470"/>
          <line x1="650" y1="130" x2="730" y2="430"/>
          <line x1="300" y1="470" x2="730" y2="430"/>
          <line x1="890" y1="270" x2="730" y2="430"/>
          <line x1="120" y1="140" x2="300" y2="470"/>
        </g>
        <g class="wg-dots">
          <circle cx="120" cy="140" r="5"/>
          <circle cx="380" cy="240" r="6"/>
          <circle cx="650" cy="130" r="5"/>
          <circle cx="890" cy="270" r="6"/>
          <circle cx="300" cy="470" r="5"/>
          <circle cx="730" cy="430" r="6"/>
        </g>
      </svg>
    </div>
    <div class="welcome-topbar">
      <button class="btn ghost sm lang-btn" id="langZh" data-lang="zh">中文</button>
      <button class="btn ghost sm lang-btn" id="langEn" data-lang="en">EN</button>
      <button class="btn ghost sm" id="howToBtn" data-i18n-title="howToTitle" title="查看使用说明" data-i18n="howTo">使用说明</button>
    </div>
    <div class="welcome-content">
      <svg class="welcome-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="wglogo" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop stop-color="#2de2c4"/><stop offset="1" stop-color="#6c8cff"/>
          </linearGradient>
        </defs>
        <path d="M32 4 L56 13 V31 C56 47 45 56 32 61 C19 56 8 47 8 31 V13 Z" stroke="url(#wglogo)" stroke-width="3.5" stroke-linejoin="round"/>
        <rect x="23" y="29" width="18" height="14" rx="2.5" stroke="url(#wglogo)" stroke-width="3"/>
        <path d="M27 29 v-3 a5 5 0 0 1 10 0 v3" stroke="url(#wglogo)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="32" cy="35" r="2.2" fill="url(#wglogo)"/>
        <path d="M32 37.2 V41" stroke="url(#wglogo)" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      <h1 class="welcome-title" data-i18n="welcomeTitle">绝对安全的信息交流</h1>
      <p class="welcome-sub" data-i18n="welcomeSub">端到端加密 · 去中心化网络 · 你的密钥只在你手中</p>
      <button class="btn primary lg" id="enterBtn" data-i18n="enterApp">开始使用 →</button>
      <p class="welcome-foot" data-i18n="welcomeFoot">SibyX · 隐私优先的本地加密聊天</p>
    </div>
  </div>

  <div class="app">
    <!-- 顶部栏（精简：仅品牌 + 汉堡） -->
    <header class="topbar">
      <button class="nav-toggle" id="navToggle" aria-label="打开菜单">☰</button>
      <div class="brand">
        <span class="logo">◈</span>
        <span class="title" data-i18n="brandTitle">SibyX</span>
        <span class="badge" id="modeBadge">本地模式</span>
        <span class="conn-dot" id="connDot" title="本地模式"></span>
      </div>
    </header>

    <!-- 主体：侧边栏 + 聊天区 -->
    <div class="body">
      <aside class="sidebar">
        <!-- 身份面板（从顶栏移入侧栏，置于最上） -->
        <section class="panel identity-panel">
          <div class="panel-head" data-i18n="identityHead">身份 Identity</div>
          <div class="id-addr-row">
            <span class="addr" id="addrLabel" data-i18n-title="addrTitle" title="你的本地身份地址" data-i18n="notLoggedIn">未登录</span>
            <button class="btn danger sm" id="logoutBtn" data-i18n-title="logoutTitle" title="清空本地身份与所有记录" data-i18n="logout">登出</button>
          </div>
          <div class="row nick-row">
            <span class="nick-label" data-i18n="nickLabel">昵称</span>
            <input type="text" id="nickInput" maxlength="20" data-i18n-ph="nickPh" placeholder="你的昵称（本机显示，并随消息发给对方）" spellcheck="false" />
          </div>
          <div class="row">
            <button class="btn ghost sm" id="exportBtn" data-i18n-title="exportTitle" title="导出身份（JSON 文件，可迁移）" data-i18n="export">导出</button>
            <button class="btn ghost sm" id="importBtn" data-i18n-title="importTitle" title="导入已导出的身份" data-i18n="import">导入</button>
          </div>
          <input type="file" id="importFile" accept="application/json" hidden />
        </section>

        <section class="panel" id="chanPanel">
          <div class="panel-head" data-i18n="channels">频道 Channels</div>
          <div class="row">
            <input type="text" id="newChannel" data-i18n-ph="newChannelPh" placeholder="新频道名" maxlength="24" />
            <button class="btn primary sm" id="joinChannelBtn" data-i18n="join">加入</button>
          </div>
          <label class="chk"><input type="checkbox" id="privateChk" /> <span data-i18n="privateChk">🔒 私有（加密成员制）</span></label>
        </section>

        <section class="panel" id="chanListPanel">
          <div class="panel-head">
            <span data-i18n="chanList">频道列表</span>
            <span class="collapse-toggle" id="chanCollapse" data-i18n-title="collapseTip" title="折叠/展开">▾</span>
          </div>
          <ul class="list" id="channelList"></ul>
          <div class="list-more-box" id="chanMoreBox"></div>
        </section>

        <section class="panel" id="friendPanel">
          <div class="panel-head">
            <span data-i18n="friends">好友 Friends</span>
            <button class="btn ghost sm" id="addFriendBtn" data-i18n-title="addFriendTitle" title="手动添加好友（需对方公钥）">＋</button>
            <span class="collapse-toggle" id="friendCollapse" data-i18n-title="collapseTip" title="折叠/展开">▾</span>
          </div>
          <ul class="list" id="friendList"></ul>
          <div class="list-more-box" id="friendMoreBox"></div>
        </section>

        <section class="panel mykey">
          <div class="panel-head" data-i18n="myPubKey">我的公钥</div>
          <button class="btn ghost sm view-pub" id="viewPubBtn" data-i18n="viewPub">查看公钥</button>
        </section>

        <section class="panel sync-panel">
          <div class="panel-head" data-i18n="syncTitle">同步 Sync</div>
          <label class="switch">
            <input type="checkbox" id="syncToggle" />
            <span data-i18n="syncLabel">去中心化同步（GunDB P2P）</span>
          </label>
          <div class="row">
            <button class="btn ghost sm" id="relayEditBtn" data-i18n="relayEdit">修改中继地址</button>
          </div>
          <div class="row relay-edit" id="relayEditBox">
            <input type="text" id="relayInput" data-i18n-ph="relayPh" placeholder="中继地址（需含 /gun）" spellcheck="false" />
            <button class="btn primary sm" id="relaySaveBtn" data-i18n="save">保存</button>
            <button class="btn ghost sm" id="relayCancelBtn" data-i18n="cancel">取消</button>
          </div>
          <div class="row backup-row">
            <button class="btn ghost sm" id="exportMsgBtn" data-i18n-title="exportMsgsTitle" title="导出全部聊天记录（JSON）" data-i18n="exportMsgs">导出记录</button>
            <button class="btn ghost sm" id="importMsgBtn" data-i18n-title="importMsgsTitle" title="从备份文件导入聊天记录" data-i18n="importMsgs">导入记录</button>
            <input type="file" id="importMsgFile" accept="application/json" hidden />
          </div>
          <span class="hint" id="syncHint">关闭：聊天记录仅存于本浏览器（IndexedDB）。</span>
        </section>
      </aside>

      <main class="main">
        <div class="ctx-header" id="ctxHeader">
          <span id="ctxTitle"># 未选择</span>
          <span class="req-badge" id="memberBadge" hidden></span>
          <button class="btn ghost sm" id="memberBtn" hidden data-i18n="memberBtn" title="查看成员 / 批准申请">👥</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="attach-preview" id="attachPreview" hidden></div>
        <footer class="composer">
          <button class="btn ghost sm" id="attachBtn" data-i18n="attachBtn" data-i18n-title="attachTitle" title="附加文件">附件</button>
          <input type="text" id="msgInput" data-i18n-ph="msgInputPh" placeholder="输入消息，回车发送…（私聊内容将被端到端加密）" autocomplete="off" />
          <button class="btn ghost sm" id="emojiBtn" data-i18n-title="emojiTitle" title="表情">😊</button>
          <button class="btn primary" id="sendBtn" data-i18n="send">发送</button>
          <input type="file" id="fileInput" accept="*/*" hidden />
          <div class="emoji-panel" id="emojiPanel">
            <div class="emoji-tabs">
              <button class="emoji-tab active" data-tab="emoji" data-i18n="emojiTabEmoji">表情</button>
              <button class="emoji-tab" data-tab="sticker" data-i18n="emojiTabSticker">表情包</button>
            </div>
            <div class="emoji-grid" id="emojiGrid"></div>
            <div class="emoji-grid sticker-grid" id="stickerGrid"></div>
          </div>
        </footer>
      </main>
    </div>

    <div class="overlay" id="overlay"></div>

    <!-- 路线 B：成员面板（模态框） -->
    <div class="modal" id="memberModal" hidden>
      <div class="modal-mask" id="memberMask"></div>
      <div class="modal-card">
        <div class="modal-head"><span id="memberTitle"></span><button class="btn ghost sm" id="memberClose" data-i18n-title="closeTip" title="关闭">✕</button></div>
        <div class="modal-body" id="memberBody"></div>
      </div>
    </div>

    <!-- 公钥查看弹窗（点击「查看公钥」打开） -->
    <div class="modal" id="pubModal" hidden>
      <div class="modal-mask" id="pubMask"></div>
      <div class="modal-card">
        <div class="modal-head"><span id="pubTitle" data-i18n="myPubKey">我的公钥</span><button class="btn ghost sm" id="pubClose" title="关闭">✕</button></div>
        <div class="modal-body">
          <p class="hint" id="pubHint" data-i18n="pubHintBody">把下面这串公钥卡片发给好友，对方即可添加你并收发端到端加密私聊：</p>
          <code id="pubContent" class="pub-code">—</code>
          <div class="row"><button class="btn primary sm" id="pubCopyBtn" data-i18n="copy">复制</button></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 通用提示弹窗（附件过大等） -->
  <div class="modal" id="alertModal" hidden>
    <div class="modal-mask" id="alertMask"></div>
    <div class="modal-card">
      <div class="modal-head"><span id="alertTitle">提示</span><button class="btn ghost sm" id="alertClose" title="关闭">✕</button></div>
      <div class="modal-body">
        <p class="hint" id="alertBody">—</p>
        <div class="row"><button class="btn primary sm" id="alertOk" data-i18n="ok">确定</button></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
